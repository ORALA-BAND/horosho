<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Фикс масштаба для мобилок (запрет зума и мелкого текста) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOPOSHO Music Album</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Загрузка -->
    <div id="boot-screen">
        <div style="color:white; font-family:sans-serif; text-align:center;">
            <h1>ORALA XP</h1>
            <div class="progress-bar"><span></span></div>
        </div>
    </div>

    <!-- Рабочий стол -->
    <main class="desktop">
        <div class="icon" onclick="openFolder('my-computer')">
            <img src="assets/computer.png">
            <span>Мой компьютер</span>
        </div>
        <div class="icon" onclick="openFolder('player')">
            <img src="assets/player.png">
            <span>Плеер</span>
        </div>
        <div class="icon" onclick="openFolder('secret')">
            <img src="assets/folder.png">
            <span>Секретно</span>
        </div>
        <div class="icon" onclick="openFolder('trash')">
            <img src="assets/trash.png">
            <span>Корзина</span>
        </div>

       <!-- Единое окно -->
<div id="window-template" class="window" style="display: none;">
    <div class="window-header">
        <span class="window-title">Папка</span>
        <button class="close-btn" onclick="closeWindow()">X</button>
    </div>
    
    <!-- Сюда подгружаем контент обычных папок -->
    <div class="window-content" id="window-body"></div>
    
    <!-- Отдельный контейнер для плеера прямо внутри окна, но по умолчанию скрыт -->
    <div id="player-container" style="display:none;">
        <div class="synth-player">
            <div class="flip-card" onclick="this.classList.toggle('flipped')">
                <div class="flip-card-inner">
                    <div class="flip-card-front"><img src="assets/album-cover.jpg" class="main-cover"></div>
                    <div class="flip-card-back"><img src="assets/album-back.jpg" class="main-cover"></div>
                </div>
            </div>
            <div id="track-title" class="neon-text" style="margin-top:15px;">ВЫБЕРИТЕ ТРЕК</div>
            <audio id="main-audio" controls controlsList="nodownload noplaybackrate"></audio>
            <div class="playlist-container" id="actual-playlist">
                <div class="tr-item" data-src="track1.mp3" data-title="01. Intro">01. Intro</div>
                <div class="tr-item" data-src="track2.mp3" data-title="02. Midnight City">02. Midnight City</div>
                <div class="tr-item" data-src="track3.mp3" data-title="03. Neon Dreams">03. Neon Dreams</div>
            </div>
            <div style="margin-top:15px; padding-bottom:10px; text-align:center;">
                <a href="ССЫЛКА" target="_blank" style="color:#ff00ff; font-size:12px; text-decoration:underline; font-weight:bold;">DOWNLOAD ALBUM</a>
            </div>
        </div>
    </div>
</div>

    </main>

    <!-- Панель задач -->
    <footer class="taskbar">
        <div class="start-button">Пуск</div>
        <div class="time" id="clock">00:00</div>
    </footer>

    <audio id="startup-sound" src="assets/startup.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
