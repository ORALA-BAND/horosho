<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALBUM RELEASE</title>
    <!-- ИСПРАВЛЕНО: Правильная ссылка на пиксельный шрифт -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #050505; 
            font-family: 'Press Start 2P', system-ui; /* ИСПРАВЛЕНО: Шрифт подтянется отсюда */
            overflow: hidden; 
            color: #fff; 
        }

        /* ЗВЕЗДНЫЙ ФОН: теперь это маленькие точки, а не один контур */
        .stars {
            position: fixed; top: 0; left: 0; width: 2px; height: 2px;
            background: transparent;
            /* ИСПРАВЛЕНО: создаем много мелких теней-звезд */
            box-shadow: 
                10vw 20vh #ffb6c1, 50vw 10vh #ff69b4, 80vw 30vh #ffb6c1, 
                20vw 70vh #ff1493, 60vw 85vh #ffb6c1, 90vw 60vh #ff69b4, 
                30vw 40vh #ffb6c1, 5vw 90vh #ff1493, 45vw 45vh #fff;
            animation: twinkle 3s infinite ease-in-out;
            z-index: 0;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .container { 
            position: relative; z-index: 1; 
            height: 100vh; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }

        /* ОБЛОЖКА */
        .cover-wrapper { perspective: 1000px; width: 280px; height: 280px; cursor: pointer; margin-bottom: 30px; }
        .cover-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .flipped .cover-inner { transform: rotateY(180deg); }

        .cover-front, .cover-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 10px; 
            border: 2px solid #ff69b4; 
            background-color: #111; /* Цвет фона, если картинка не прогрузится */
        }
        
        /* ИСПРАВЛЕНО: пути. Убедись, что файлы лежат в той же папке на GitHub */
        .cover-front { background: url('./front.jpg') center/cover no-repeat; }
        .cover-back { background: url('./back.jpg') center/cover no-repeat; transform: rotateY(180deg); }

        /* КНОПКИ */
        .controls { width: 90%; max-width: 500px; text-align: center; }
        
        .main-btn { 
            font-size: 14px; color: #ff69b4; 
            text-decoration: none; /* Убирает подчеркивание */
            display: inline-block; margin-bottom: 40px; 
            cursor: pointer; transition: 0.2s; 
        }
        
        .bottom-row { display: flex; justify-content: space-between; gap: 10px; }
        
        .side-btn { 
            color: #fff; text-decoration: none; /* Убирает подчеркивание */
            font-size: 8px; cursor: pointer; opacity: 0.8;
        }
        
        .main-btn:hover, .side-btn:hover { color: #ff1493; transform: scale(1.05); opacity: 1; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <div class="cover-wrapper" onclick="this.classList.toggle('flipped')">
            <div class="cover-inner">
                <div class="cover-front"></div>
                <div class="cover-back"></div>
            </div>
        </div>

        <div class="controls">
            <a onclick="downloadAlbum()" class="main-btn">хорошо horosho</a>
            
            <div class="bottom-row">
                <a href="ССЫЛКА_1" class="side-btn">поддержать релиз</a>
                <a href="ССЫЛКА_2" class="side-btn">support the release</a>
            </div>
        </div>
    </div>

    <script>
        function downloadAlbum() {
            if (confirm("Скачать альбом? / Download?")) {
                window.location.href = "ССЫЛКА_НА_ФАЙЛ"; 
            }
        }
    </script>

</body>
</html>
