<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Фикс масштаба для мобилок (запрет зума и мелкого текста) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOPOSHO Music Album</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Загрузка -->
    <div id="boot-screen">
        <div style="color:white; font-family:sans-serif; text-align:center;">
            <h1>ORALA XP</h1>
            <div class="progress-bar"><span></span></div>
        </div>
    </div>

    <!-- Рабочий стол -->
    <main class="desktop">
        <div class="icon" onclick="openFolder('my-computer')">
            <img src="assets/computer.png">
            <span>Мой компьютер</span>
        </div>
        <div class="icon" onclick="openFolder('player')">
            <img src="assets/player.png">
            <span>Плеер</span>
        </div>
        <div class="icon" onclick="openFolder('secret')">
            <img src="assets/folder.png">
            <span>Секретно</span>
        </div>
        <div class="icon" onclick="openFolder('trash')">
            <img src="assets/trash.png">
            <span>Корзина</span>
        </div>

        <!-- Единое окно -->
        <div id="window-template" class="window" style="display: none;">
            <div class="window-header">
                <span class="window-title">Папка</span>
                <button class="close-btn" onclick="closeWindow()">X</button>
            </div>
            <div class="window-content" id="window-body"></div>
        </div>
    </main>

    <!-- Панель задач -->
    <footer class="taskbar">
        <div class="start-button">Пуск</div>
        <div class="time" id="clock">00:00</div>
    </footer>

    <audio id="startup-sound" src="assets/startup.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
