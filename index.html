<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>horosho</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #050505; 
            font-family: 'Press Start 2P', cursive;
            overflow: hidden; 
            color: #fff; 
        }

        /* МНОГО ЗВЕЗД В РАЗНЫХ МЕСТАХ */
        .stars {
            position: fixed; top: 0; left: 0; width: 2px; height: 2px;
            background: transparent;
            /* Генерация множества точек по всему экрану */
            box-shadow: 
                15vw 10vh #fff, 35vw 25vh #ffb6c1, 65vw 15vh #ff69b4, 85vw 40vh #fff,
                10vw 60vh #ff1493, 30vw 80vh #ffb6c1, 55vw 70vh #fff, 75vw 90vh #ff69b4,
                95vw 20vh #ff1493, 45vw 50vh #fff, 20vw 35vh #ffb6c1, 80vw 65vh #ff69b4,
                5vw 15vh #fff, 90vw 85vh #ff1493, 40vw 5vh #ffb6c1, 70vw 45vh #fff;
            animation: twinkle 4s infinite ease-in-out;
            z-index: 0;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .container { 
            position: relative; z-index: 1; 
            height: 100vh; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }

        /* ЛОГОТИП ГРУППЫ */
        .logo {
            width: 200px; /* Отрегулируй ширину под свое лого */
            height: auto;
            margin-bottom: 20px;
        }

        /* УВЕЛИЧЕННАЯ ОБЛОЖКА */
        .cover-wrapper { perspective: 1000px; width: 350px; height: 350px; cursor: pointer; margin-bottom: 30px; }
        .cover-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; }
        .flipped .cover-inner { transform: rotateY(180deg); }

        .cover-front, .cover-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 15px; 
            border: 3px solid #ff69b4; 
            background-color: #111;
        }
        .cover-front { background: url('./front.jpg') center/cover no-repeat; }
        .cover-back { background: url('./back.jpg') center/cover no-repeat; transform: rotateY(180deg); }

        /* КНОПКИ */
        .controls { width: 90%; max-width: 500px; text-align: center; }
        
        /* Главная кнопка: текст один под другим */
        .main-btn { 
            font-size: 20px; color: #ff69b4; 
            text-decoration: none;
            display: flex; flex-direction: column; /* Текст в колонку */
            gap: 10px; margin-bottom: 40px; 
            cursor: pointer; transition: 0.2s; 
            line-height: 1.2;
        }
        
        /* Нижние кнопки: побольше и ближе */
        .bottom-row { display: flex; justify-content: center; gap: 30px; }
        
        .side-btn { 
            color: #fff; text-decoration: none; 
            font-size: 11px; cursor: pointer; 
            max-width: 150px; line-height: 1.4;
        }
        
        .main-btn:hover, .side-btn:hover { color: #ff1493; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container">
        <!-- Замени logo.png на название файла своего логотипа -->
        <img src="logo.png" alt="Band Logo" class="logo">

        <div class="cover-wrapper" onclick="this.classList.toggle('flipped')">
            <div class="cover-inner">
                <div class="cover-front"></div>
                <div class="cover-back"></div>
            </div>
        </div>

        <div class="controls">
            <a onclick="downloadAlbum()" class="main-btn">
                <span>хорошо</span>
                <span>horosho</span>
            </a>
            
            <div class="bottom-row">
                <a href="ССЫЛКА_1" class="side-btn">поддержать релиз</a>
                <a href="ССЫЛКА_2" class="side-btn">support the release</a>
            </div>
        </div>
    </div>

    <script>
        function downloadAlbum() {
            if (confirm("Скачать альбом? / Download?")) {
                window.location.href = "ССЫЛКА_НА_ФАЙЛ"; 
            }
        }
    </script>

</body>
</html>
