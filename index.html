<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALBUM RELEASE</title>
    <!-- Подключение пиксельного шрифта -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #050505; 
            font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
            overflow: hidden; color: #fff; 
        }

        /* ТРИ СЛОЯ ЗВЕЗД РАЗНОГО РАЗМЕРА */
        .stars, .stars2, .stars3 { position: fixed; top: 0; left: 0; background: transparent; animation: twinkle 4s infinite ease-in-out; z-index: 0; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        .stars { width: 1px; height: 1px; box-shadow: 10vw 10vh #fff, 25vw 30vh #ffb6c1, 50vw 5vh #fff, 75vw 40vh #ff69b4, 90vw 15vh #fff, 5vw 80vh #ff1493, 40vw 90vh #fff, 65vw 60vh #ffb6c1, 15vw 55vh #fff, 80vw 85vh #ff69b4, 33vw 12vh #fff, 88vw 77vh #ffb6c1; }
        .stars2 { width: 2px; height: 2px; box-shadow: 20vw 20vh #fff, 45vw 45vh #ffb6c1, 70vw 10vh #fff, 15vw 75vh #ff69b4, 85vw 60vh #fff, 35vw 85vh #ff1493, 60vw 30vh #fff, 95vw 90vh #ffb6c1, 12vw 12vh #fff, 55vw 88vh #ff1493; animation-delay: 1s; }
        .stars3 { width: 3px; height: 3px; box-shadow: 55vw 20vh #fff, 10vw 40vh #ffb6c1, 80vw 25vh #fff, 30vw 65vh #ff69b4, 50vw 80vh #fff, 5vw 5vh #fff; animation-delay: 2s; }

        .container { 
            position: relative; z-index: 1; 
            height: 100vh; width: 100%;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            box-sizing: border-box; 
            padding: 20px;
            padding-bottom: 80px; /* Запас снизу, чтобы не прилипало */
        }

        .logo { 
            width: 150px; 
            max-width: 40%;
            height: auto; 
            margin-bottom: 20px; 
        }

        /* РЕЗИНОВАЯ ОБЛОЖКА */
        .cover-wrapper { 
            perspective: 1000px; 
            width: 80vw;         /* Занимает 80% ширины экрана */
            max-width: 350px;    /* Но не больше 350px на больших мониторах */
            aspect-ratio: 1 / 1; /* Всегда квадрат */
            cursor: pointer; 
            margin-bottom: 30px; 
        }

        .cover-inner { 
            position: relative; width: 100%; height: 100%; 
            transition: transform 0.8s; transform-style: preserve-3d; 
        }
        .flipped .cover-inner { transform: rotateY(180deg); }

        .cover-front, .cover-back { 
            position: absolute; width: 100%; height: 100%; 
            backface-visibility: hidden; border-radius: 15px; 
            border: 3px solid #ff69b4; background-color: #111; 
        }
        .cover-front { background: url('./front.jpg') center/cover no-repeat; }
        .cover-back { background: url('./back.jpg') center/cover no-repeat; transform: rotateY(180deg); }

        .controls { width: 100%; text-align: center; }
        
        .main-btn { 
            font-size: 22px; color: #ff69b4; text-decoration: none; 
            display: flex; flex-direction: column; 
            gap: 2px; /* Расстояние между хорошо и horosho */
            margin-bottom: 35px; cursor: pointer; transition: 0.2s; 
            line-height: 1;
        }
        
        .bottom-row { 
            display: flex; justify-content: center; 
            gap: 20px; /* Расстояние между нижними кнопками */
            flex-wrap: wrap; /* Чтобы на совсем мелких экранах кнопки не вылезали */
        }
        
        .side-btn { 
            color: #fff; text-decoration: none; 
            font-size: 10px; cursor: pointer; 
            opacity: 0.8; transition: 0.3s;
        }
        
        .main-btn:hover, .side-btn:hover { color: #ff1493; transform: scale(1.05); opacity: 1; }

        /* Адаптация шрифта для маленьких экранов */
        @media (max-width: 400px) {
            .main-btn { font-size: 18px; }
            .side-btn { font-size: 8px; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="stars2"></div>
    <div class="stars3"></div>

    <div class="container">
        <!-- Логотип (убедись, что файл logo.png загружен) -->
        <img src="logo.png" alt="" class="logo">

        <div class="cover-wrapper" onclick="this.classList.toggle('flipped')">
            <div class="cover-inner">
                <div class="cover-front"></div>
                <div class="cover-back"></div>
            </div>
        </div>

        <div class="controls">
            <a onclick="downloadAlbum()" class="main-btn">
                <span>ХОРОШО</span>
                <span>HOROSHO</span>
            </a>
            <div class="bottom-row">
                <a href="ССЫЛКА_НА_ПОДДЕРЖКУ" class="side-btn">поддержать релиз</a>
                <a href="ССЫЛКА_НА_PAYPAL" class="side-btn">support the release</a>
            </div>
        </div>
    </div>

    <script>
        function downloadAlbum() {
            if (confirm("Скачать альбом? / Download?")) {
                window.location.href = "ССЫЛКА_НА_АРХИВ_АЛЬБОМА"; 
            }
        }
    </script>
</body>
</html>
